server:
  port: 80

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      url: jdbc:mysql://localhost:3306/rbac?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      username: root
      password: 123456
      # 开启 SQL 监控统计（不配这个，监控页看不到 SQL）
      filters: stat
      # 监控页（StatViewServlet）
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
        reset-enable: false
      # Web 关联监控（按 URI 统计）
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    # 开启发布确认（消息到达 Exchange 时回调）
    publisher-confirm-type: correlated
    # 开启发布返回（消息从 Exchange 到达 Queue 失败时回调）
    publisher-returns: true
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
    livereload:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0       # 0~15 共 16 个库
      lettuce:
        pool:
          max-active: 8      # 最大连接数
          max-idle: 8        # 最大空闲连接
          min-idle: 0        # 最小空闲连接
          max-wait: -1ms     # 获取连接最大等待时间，-1 表示不限
      timeout: 3000ms        # 连接超时时间
mybatis-plus:
  global-config:
    db-config:
      table-prefix: sys_
jwt:
  secret: cheer-secret-key-for-jwt-token-generation-at-least-32-chars!!
  expiration: 7200000    # 2 小时，单位毫秒
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: true
  setting:
    language: zh_cn

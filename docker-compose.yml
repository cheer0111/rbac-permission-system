version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: rbac-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: rbac
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./demo/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - rbac-net

  redis:
    image: redis:7-alpine
    container_name: rbac-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rbac-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rbac-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - rbac-net

  app:
    build:
      context: ./demo
      dockerfile: Dockerfile
    container_name: rbac-app
    ports:
      - "80:80"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - mysql
      - redis
      - rabbitmq
    volumes:
      - app-uploads:/app/uploads
    networks:
      - rbac-net

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  app-uploads:

networks:
  rbac-net:
    driver: bridge
